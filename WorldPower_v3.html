<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>World Power</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Vazirmatn:wght@400;700&display=swap");
:root{--g:#c9a84c;--g2:#f0d080;--dk:#0a0e1a;--dk2:#111827;--dk3:#1a2540;--gr:#22c55e;--rd:#ef4444;--bl:#3b82f6;--pn:rgba(8,12,24,0.97);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;font-family:"Vazirmatn",sans-serif;color:#e2e8f0;user-select:none;}
.sc{position:absolute;inset:0;display:none;flex-direction:column;}.sc.active{display:flex;}
/* INTRO */
#intro{background:radial-gradient(ellipse at 50% 40%,#1a2a4a,#0a0e1a);align-items:center;justify-content:center;}
.it{font-family:"Cinzel",serif;font-size:clamp(2rem,8vw,5rem);font-weight:900;color:var(--g);letter-spacing:6px;text-align:center;animation:gp 3s ease-in-out infinite;}
.is{font-family:"Cinzel",serif;color:rgba(201,168,76,.5);letter-spacing:8px;font-size:.9rem;margin-top:8px;text-align:center;}
@keyframes gp{0%,100%{text-shadow:0 0 40px rgba(201,168,76,.5);}50%{text-shadow:0 0 100px rgba(201,168,76,.9);}}
.sb{margin-top:50px;padding:14px 60px;background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);color:#000;font-family:"Cinzel",serif;font-size:1.1rem;font-weight:700;border:none;cursor:pointer;clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);letter-spacing:3px;}
.sb:active{transform:scale(.96);}
/* COUNTRY SELECT */
#csel{background:var(--dk2);overflow:hidden;}
.csh{padding:16px 20px 8px;text-align:center;flex-shrink:0;}
.cst{font-family:"Cinzel",serif;color:var(--g);font-size:1.3rem;letter-spacing:2px;}
.css{color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px;}
.csb{flex:1;overflow-y:auto;padding:0 16px 16px;}
.rl{color:var(--g2);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;margin:14px 0 8px;padding-right:6px;border-right:3px solid var(--g);}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cc{background:var(--dk3);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;}
.cc:active{transform:scale(.94);background:rgba(201,168,76,.12);}
.cc.iran-card{border-color:rgba(201,168,76,.5);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(0,100,50,.08));}
.cf{font-size:1.6rem;}.cn{font-weight:700;font-size:.85rem;}.cd{font-size:.65rem;color:rgba(255,255,255,.5);margin-top:2px;}
/* GAME */
#game{flex-direction:column;}
.hud{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(8,12,24,.98);border-bottom:1px solid rgba(201,168,76,.2);flex-shrink:0;height:58px;}
.hl{display:flex;align-items:center;gap:8px;}
.hfl{font-size:1.9rem;}
.hcn{font-family:"Cinzel",serif;color:var(--g);font-size:.82rem;font-weight:700;}
.hml{font-size:.6rem;color:rgba(255,255,255,.6);margin-top:2px;display:flex;gap:5px;}
.hr{display:flex;gap:10px;align-items:center;}
.hv{font-size:.88rem;font-weight:700;}
.mc{color:var(--g);}.oc{color:#60a5fa;}
.hset{background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:6px;color:var(--g);width:28px;height:28px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
/* MAP */
.mc2{flex:1;overflow:hidden;position:relative;background:#060e1e;}
.mw{width:100%;height:100%;overflow:hidden;cursor:grab;position:relative;}
.mw:active{cursor:grabbing;}
#msvg{width:100%;height:100%;display:block;transform-origin:0 0;}
/* BOTTOM NAV */
.bb{display:flex;background:rgba(8,12,24,.98);border-top:1px solid rgba(201,168,76,.2);flex-shrink:0;}
.nb{flex:1;padding:7px 2px;background:transparent;border:none;color:rgba(255,255,255,.45);font-size:.52rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:"Vazirmatn",sans-serif;transition:color .2s;position:relative;}
.nb .ni{font-size:1.1rem;}.nb.active{color:var(--g);}.nb:active{background:rgba(201,168,76,.08);}
.rbg{position:absolute;top:3px;right:calc(50% - 14px);background:var(--rd);color:#fff;border-radius:50%;width:14px;height:14px;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
/* PANELS */
.pl{position:fixed;bottom:0;left:0;right:0;background:var(--pn);border-top:1px solid rgba(201,168,76,.25);border-radius:18px 18px 0 0;z-index:200;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:76vh;display:flex;flex-direction:column;}
.pl.open{transform:translateY(0);}
.ph{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 4px;flex-shrink:0;}
.phd{display:flex;align-items:center;justify-content:center;padding:4px 16px 10px;flex-shrink:0;position:relative;}
.pt{font-family:"Cinzel",serif;color:var(--g);font-size:1rem;letter-spacing:2px;}
.pc{position:absolute;left:16px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:1.1rem;cursor:pointer;padding:4px;}
.pb{overflow-y:auto;padding:0 14px 16px;flex:1;}
/* SHOP */
.stabs{display:flex;gap:4px;background:var(--dk3);border-radius:8px;padding:4px;margin-bottom:12px;}
.stab{flex:1;padding:7px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:.66rem;cursor:pointer;border-radius:6px;font-family:"Vazirmatn",sans-serif;transition:all .2s;}
.stab.active{background:var(--g);color:#000;font-weight:700;}
.si{background:var(--dk3);border:1px solid rgba(201,168,76,.12);border-radius:10px;padding:11px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.si.owned{border-color:var(--gr);}.si.upg{border-color:#f59e0b;}
.sic{font-size:1.7rem;width:40px;text-align:center;}.sin{font-weight:700;font-size:.82rem;}
.sid{font-size:.65rem;color:rgba(255,255,255,.45);margin-top:2px;}
.sip{color:var(--g);font-size:.78rem;font-weight:700;margin-top:3px;}
.sil{color:#f59e0b;font-size:.65rem;margin-top:2px;}
.sio{color:var(--gr);font-size:.68rem;}
.bb2{padding:7px 12px;background:linear-gradient(135deg,var(--g),var(--g2));color:#000;border:none;border-radius:8px;font-weight:700;font-size:.72rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;white-space:nowrap;}
.bb2:disabled{background:#2a2a2a;color:#555;cursor:not-allowed;}
.ub{padding:7px 10px;background:linear-gradient(135deg,#f59e0b,#fcd34d);color:#000;border:none;border-radius:8px;font-weight:700;font-size:.65rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;white-space:nowrap;}
/* DIPLO */
.di{background:var(--dk3);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.dfl{font-size:1.5rem;}.din{font-weight:700;font-size:.82rem;}.drl{font-size:.65rem;margin-top:2px;}
.rff{color:var(--gr);}.rfn{color:#facc15;}.rfe{color:var(--rd);}
.dbs{display:flex;gap:4px;flex-wrap:wrap;}
.db{padding:5px 8px;border:1px solid;border-radius:6px;background:transparent;font-size:.6rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;}
.db:active{transform:scale(.92);}
.db.oil{border-color:#60a5fa;color:#60a5fa;}.db.trd{border-color:var(--g);color:var(--g);}
.db.aly{border-color:var(--gr);color:var(--gr);}.db.atk{border-color:var(--rd);color:var(--rd);}
.db.unaly{border-color:#f97316;color:#f97316;}.db.rq{border-color:#a78bfa;color:#a78bfa;}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.sc2{background:var(--dk3);border-radius:10px;padding:12px;text-align:center;}
.sci{font-size:1.4rem;margin-bottom:4px;}.scv{font-size:.95rem;font-weight:700;}.scl{font-size:.6rem;color:rgba(255,255,255,.45);margin-top:2px;}
.bw{margin:6px 0;}.bl2{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px;}
.bt{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.bf{height:100%;border-radius:3px;transition:width .5s;}
/* VAULT */
.vb{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(59,130,246,.08));border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:14px;margin-bottom:14px;}
.vt{font-family:"Cinzel",serif;color:var(--g);font-size:.85rem;margin-bottom:10px;text-align:center;}
.vr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.vi{font-size:.78rem;}.vs{color:var(--g2);font-size:.7rem;margin-top:2px;}
.vbs{display:flex;gap:6px;}
.vbn{padding:6px 10px;border:none;border-radius:7px;font-size:.68rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;font-weight:700;}
.vd{background:var(--gr);color:#000;}.vw{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid var(--rd);}
/* REQUESTS */
.ri{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(59,130,246,.05));border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px;margin-bottom:8px;}
.rih{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rfl{font-size:1.4rem;}.rfm{font-size:.8rem;font-weight:700;}
.rm{font-size:.72rem;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:10px;}
.rbs{display:flex;gap:8px;}
.ra{padding:7px 16px;background:var(--gr);color:#000;border:none;border-radius:8px;font-weight:700;font-size:.72rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;}
.rj{padding:7px 16px;background:rgba(239,68,68,.15);color:var(--rd);border:1px solid var(--rd);border-radius:8px;font-size:.72rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;}
/* SETTINGS */
.sti{color:var(--g);font-size:.8rem;margin-bottom:8px;margin-top:14px;letter-spacing:1px;}
.sro{display:flex;align-items:center;justify-content:space-between;background:var(--dk3);border-radius:8px;padding:12px 14px;margin-bottom:6px;}
.sla{font-size:.8rem;}.sde{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:2px;}
.tg{width:44px;height:24px;background:#333;border-radius:12px;cursor:pointer;position:relative;transition:background .3s;border:none;flex-shrink:0;}
.tg.on{background:var(--gr);}.tg::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .3s;}
.tg.on::after{left:22px;}
.vsl{width:110px;accent-color:var(--g);cursor:pointer;}
/* POPUP */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;}
.ov.show{display:block;}
.pp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:var(--pn);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:18px;z-index:301;width:min(340px,88vw);opacity:0;pointer-events:none;transition:all .2s;}
.pp.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all;}
.ppc{position:absolute;top:12px;left:12px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:1rem;cursor:pointer;}
.rf{background:var(--dk3);border-radius:10px;padding:12px;margin-top:10px;}
.rft{font-size:.75rem;color:var(--g2);margin-bottom:7px;}
.rsl,.ri2{width:100%;background:var(--dk);border:1px solid rgba(201,168,76,.2);border-radius:6px;color:#fff;padding:7px 10px;font-size:.75rem;font-family:"Vazirmatn",sans-serif;margin-bottom:8px;}
.rsb{width:100%;padding:9px;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.78rem;cursor:pointer;font-family:"Vazirmatn",sans-serif;}
/* NOTIF */
.nf{position:fixed;top:65px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(10,14,26,.95);border:1px solid var(--g);border-radius:8px;padding:9px 18px;font-size:.76rem;color:var(--g2);z-index:500;opacity:0;transition:all .3s;pointer-events:none;text-align:center;max-width:88vw;}
.nf.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* MAP CONTROLS */
.zb{position:absolute;bottom:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:100;}
.zbn{width:30px;height:30px;background:rgba(10,14,26,.85);border:1px solid rgba(201,168,76,.3);color:var(--g);border-radius:6px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.db2{position:absolute;bottom:10px;right:10px;background:rgba(10,14,26,.85);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:4px 10px;font-size:.68rem;color:rgba(255,255,255,.5);z-index:100;}
.spc{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(10,14,26,.85);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:4px 10px;font-size:.62rem;color:rgba(255,255,255,.5);z-index:100;display:flex;align-items:center;gap:5px;}
.spb{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--g);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:.62rem;}
.spb.active{background:rgba(201,168,76,.2);}
/* IRAN HIGHLIGHT */
.iran-popup-header{background:linear-gradient(135deg,rgba(0,100,50,.3),rgba(201,168,76,.15));border-radius:10px;padding:10px;margin-bottom:12px;text-align:center;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px;}
</style>
</head>

          <radialGradient id="bg" cx="50%" cy="50%" r="70%"><stop offset="0%" style="stop-color:#0d1f3c"/><stop offset="100%" style="stop-color:#060e1e"/></radialGradient>

    let f="#1a3a5c",s="#2d5a8e",sw="0.8",fi="";

      else{f="#c9a84c";s="#f0d080";sw="1.5";}
    }else{
      const r=G.cs[id]?.rel;
      if(r==="friend")f="#1a4a2c";else if(r==="enemy")f="#4a1a1a";
      if(G.al.includes(id)){f="#1a5a3c";s="#22c55e";}
    }
    el.setAttribute("fill",f);el.setAttribute("stroke",s);el.setAttribute("stroke-width",sw);
    if(fi)el.setAttribute("filter","url(#glow2)");else el.removeAttribute("filter");

  }
}
function initMap(){
  const w=document.getElementById("mapW");let drag=false,lx=0,ly=0,pinch=0;
  w.addEventListener("touchstart",e=>{uAC();if(e.touches.length===2){pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);return;}drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
  w.addEventListener("touchmove",e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);dZ(d/pinch);pinch=d;return;}if(!drag)return;G.px+=e.touches[0].clientX-lx;G.py+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;apT();},{passive:true});
  w.addEventListener("touchend",()=>drag=false);
  w.addEventListener("mousedown",e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  w.addEventListener("mousemove",e=>{if(!drag)return;G.px+=e.clientX-lx;G.py+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apT();});
  w.addEventListener("mouseup",()=>drag=false);
  w.addEventListener("wheel",e=>{e.preventDefault();dZ(e.deltaY<0?1.15:0.87);},{passive:false});
}
function dZ(f){G.zoom=Math.min(6,Math.max(0.4,G.zoom*f));apT();}
function rZ(){G.zoom=1;G.px=0;G.py=0;apT();}
function apT(){const t=`translate(${G.px}px,${G.py}px) scale(${G.zoom})`;document.getElementById("msvg").style.transform=t;document.getElementById("htmlOv").style.transform=t;}
function gSP(cx,cy){const svg=document.getElementById("msvg"),r=svg.getBoundingClientRect();return{x:cx*(r.width/1010),y:cy*(r.height/550)};}

function sellOil(id){
  const s=G.cs[G.pid],b=CD[id];
  const oilAmt=500e6; // 500M liters
  if(s.oil<oilAmt){notify("نفت کافی ندارید! (۵۰۰M لیتر لازم است)");return;}
  const pm=G.owned["port"]?(1+(G.upg["port"]||0)*0.25+0.25):1;
  const price=Math.floor((20e9+Math.random()*60e9)*pm);
  s.oil-=oilAmt;s.money=Math.min(MAX_MONEY,s.money+price);
  if(G.cs[id].rel==="enemy")G.cs[id].rel="neutral";
  animShip(CD[G.pid].cx,CD[G.pid].cy,b.cx,b.cy);pShip();
  notify(`${b.flag} فروش ۵۰۰M L نفت → +${fRial(price)}`);updH();colMap();
}
function trade(id){
  const s=G.cs[G.pid],b=CD[id];
  if(s.money<10e9){notify("پول کافی ندارید!");return;}
  const gain=Math.floor(15e9+Math.random()*25e9);
  s.money=Math.min(MAX_MONEY,s.money+gain);s.happy=Math.min(100,s.happy+2);pBuy();
  notify(`${b.flag} تجارت → +${fRial(gain)}`);updH();
}
function addAl(id){
  if(G.al.length>=2){notify("حداکثر ۲ اتحاد مجاز است!");return;}
  G.al.push(id);G.cs[id].rel="friend";colMap();pBuy();
  notify(`${CD[id].flag} ${CD[id].name} متحد شد! 🤝`);updH();
}
function rmAl(id){G.al=G.al.filter(x=>x!==id);G.cs[id].rel="neutral";colMap();notify(`اتحاد با ${CD[id].flag} لغو شد`);}
function atk(id){
  const b=CD[id];
  if(G.mis===0&&G.jets===0&&G.drones===0){notify("ابتدا سلاح بخرید!");return;}
  if(G.al.includes(id)){notify("نمی‌توانید به متحد حمله کنید!");return;}
  let icon="🚀",sfn=pMis;
  // Use what we have - limited to actual count
  if(G.drones>0&&Math.random()<0.35){icon="🛸";sfn=pDrn;G.drones=Math.max(0,G.drones-1);}
  else if(G.jets>0&&Math.random()<0.3){icon="✈️";sfn=pJet;G.jets=Math.max(0,G.jets-1);}
  else if(G.mis>0){G.mis=Math.max(0,G.mis-1);}
  else if(G.drones>0){icon="🛸";sfn=pDrn;G.drones=Math.max(0,G.drones-1);}
  else if(G.jets>0){icon="✈️";sfn=pJet;G.jets=Math.max(0,G.jets-1);}
  sfn();pWar();
  animMis(CD[G.pid].cx,CD[G.pid].cy,b.cx,b.cy,icon,()=>{
    const dr=[0,0.35,0.55,0.7,0.85,0.92][Math.min(G.cs[id].defLvl,5)];
    if(Math.random()<dr){notify(`${b.flag} پدافند ${b.name} حمله را خنثی کرد!`);}
    else{
      const dmg=Math.floor((20e9+Math.random()*80e9)*(icon==="☄️"?2:1));
      G.cs[id].money=Math.max(0,G.cs[id].money-dmg);
      G.cs[id].rel="enemy";
      notify(`${b.flag} ${b.name} آسیب دید! -${fRial(dmg)} ⚔️`);
    }
    updH();colMap();
  });
}

function subReq(id){
  const type=document.getElementById("rqT").value;

  const b=CD[id],s=G.cs[G.pid];
  const oilAmt=amt*1e6,monAmt=amt*1e9;

    setTimeout(()=>{if(Math.random()<0.62){s.oil+=oilAmt;s.money=Math.max(0,s.money-pay);G.cs[id].oil=Math.max(0,G.cs[id].oil-oilAmt);G.cs[id].money=Math.min(MAX_MONEY,G.cs[id].money+pay);updH();notify(`${b.flag} قبول کرد! +${fOil(oilAmt)} ✅`);}else notify(`${b.flag} رد کرد ❌`);},2500);
  }else if(type==="sell_oil"){
    const get=Math.floor(oilAmt*0.028);
    if(s.oil<oilAmt){notify("نفت کافی ندارید!");clPop();return;}
    setTimeout(()=>{if(Math.random()<0.6){s.oil-=oilAmt;s.money=Math.min(MAX_MONEY,s.money+get);updH();notify(`${b.flag} خرید! +${fRial(get)} ✅`);}else notify(`${b.flag} رد کرد ❌`);},2500);
  }else if(type==="money_oil"){
    if(s.money<monAmt){notify("پول کافی ندارید!");clPop();return;}
    setTimeout(()=>{if(Math.random()<0.55){s.money-=monAmt;s.oil+=oilAmt*2;updH();notify(`${b.flag} قبول کرد! ✅`);}else notify(`${b.flag} رد کرد ❌`);},2500);
  }else if(type==="ally"){
    if(G.al.length>=2){notify("ظرفیت اتحاد پر!");clPop();return;}
    setTimeout(()=>{if(Math.random()<0.52){addAl(id);notify(`${b.flag} اتحاد قبول شد! 🤝`);}else notify(`${b.flag} رد کرد ❌`);},2000);
  }else if(type==="gift"){
    const gift=Math.floor(Math.random()*30e9+10e9);
    setTimeout(()=>{if(Math.random()<0.7){s.money=Math.min(MAX_MONEY,s.money+gift);updH();notify(`${b.flag} پیشنهاد قبول! +${fRial(gift)} 🎁`);}else notify(`${b.flag} رد کرد ❌`);},2000);
  }
  clPop();notify(`📨 درخواست ارسال شد به ${b.flag} ${b.name}`);
}

function swSh(t){G.shopTab=t;document.querySelectorAll(".stab").forEach((b,i)=>b.classList.toggle("active",["fac","wpn","def"][i]===t));rSh();}
function rSh(){
  const items=SHOP[G.shopTab];let h="";
  for(let it of items){
    const ow=G.owned[it.id],ul=G.upg[it.id]||0,mu=it.upg?.length||0,canU=ow&&ul<mu,nu=canU?it.upg[ul]:null;
    const s=G.cs[G.pid];const ca=s.money>=(ow?nu?.price||0:it.price);
    if(!ow){
      h+=`<div class="si"><div class="sic">${it.icon}</div><div style="flex:1"><div class="sin">${it.name}</div><div class="sid">${it.desc}</div><div class="sip">💸 ${fRial(it.price)}</div></div><button class="bb2" ${ca?"":"disabled"} onclick="buyIt('${it.id}');pCk()">${ca?"خرید":"کم"}</button></div>`;
    }else if(canU){
      h+=`<div class="si upg"><div class="sic">${it.icon}</div><div style="flex:1"><div class="sin">${it.name}</div><div class="sid">${nu.desc}</div><div class="sil">⬆️ سطح ${ul+1}→${ul+2} | ${fRial(nu.price)}</div></div><button class="ub" ${ca?"":"disabled"} onclick="upgIt('${it.id}');pCk()">ارتقا</button></div>`;
    }else{

function buyIt(id){
  const all=[...SHOP.fac,...SHOP.wpn,...SHOP.def],it=all.find(x=>x.id===id);if(!it||G.owned[id])return;
  const s=G.cs[G.pid];if(s.money<it.price){notify("پول کافی ندارید!");return;}
  s.money-=it.price;G.owned[id]=true;
  if(it.mis)G.mis+=it.mis;if(it.jets)G.jets+=it.jets;if(it.drones)G.drones+=it.drones;
  if(it.dlvl)G.defLvl=Math.max(G.defLvl,it.dlvl);
  if(it.id==="mall")s.happy=Math.min(100,s.happy+10);
  if(it.id==="hospital")s.happy=Math.min(100,s.happy+15);
  pBuy();notify(`${it.icon} ${it.name} خریداری شد!`);updH();rSh();
}
function upgIt(id){
  const all=[...SHOP.fac,...SHOP.wpn,...SHOP.def],it=all.find(x=>x.id===id);if(!it||!G.owned[id])return;
  const lvl=G.upg[id]||0;if(lvl>=it.upg.length)return;
  const u=it.upg[lvl],s=G.cs[G.pid];if(s.money<u.price){notify("پول کافی ندارید!");return;}
  s.money-=u.price;G.upg[id]=lvl+1;
  if(u.mis)G.mis+=u.mis;if(u.jets)G.jets+=u.jets;if(u.drones)G.drones+=u.drones;if(u.dlvl)G.defLvl=Math.max(G.defLvl,u.dlvl);
  pBuy();notify(`⬆️ ${it.name} ارتقا → سطح ${lvl+2}!`);updH();rSh();
}

function accR(i){
  const r=G.reqs[i],s=G.cs[G.pid];
  if(r.oil&&r.oil>0)s.oil+=r.oil;if(r.oil&&r.oil<0)s.oil=Math.max(0,s.oil+r.oil);
  if(r.money&&r.money>0)s.money=Math.min(MAX_MONEY,s.money+r.money);if(r.money&&r.money<0)s.money=Math.max(0,s.money+r.money);
  if(r.isA&&G.al.length<2)addAl(r.from);
  notify("✅ درخواست قبول شد!");pBuy();G.reqs.splice(i,1);updH();rReqs();
}
function rejR(i){G.reqs.splice(i,1);notify("❌ رد شد");rReqs();updH();}

// ===== SETTINGS =====
function rSett(){
  document.getElementById("settB").innerHTML=`
    <div class="sti">🔊 صدا</div>
    <div class="sro"><div><div class="sla">صدای بازی</div><div class="sde">همه افکت‌های صوتی</div></div><button class="tg ${SFX.on?"on":""}" id="sfxTg" onclick="togSFX()"></button></div>
    <div class="sro"><div><div class="sla">میزان صدا: <span id="volPct">${Math.round(SFX.vol*100)}</span>٪</div></div><input class="vsl" type="range" min="0" max="100" value="${Math.round(SFX.vol*100)}" oninput="SFX.vol=this.value/100;document.getElementById('volPct').textContent=this.value"></div>
    <div class="sti">⚡ سرعت بازی</div>
    <div class="sro"><div><div class="sla">سرعت روز</div><div class="sde">⏸ = متوقف | ۱× = عادی | ۲× = سریع</div></div><div style="display:flex;gap:6px"><button class="spb ${G.spd===0?"active":""}" onclick="setSp(0);rSett()">⏸</button><button class="spb ${G.spd===1?"active":""}" onclick="setSp(1);rSett()">۱×</button><button class="spb ${G.spd===2?"active":""}" onclick="setSp(2);rSett()">۲×</button></div></div>
    <div class="sti">📱 درباره</div>
    <div class="sro" style="flex-direction:column;align-items:flex-start;gap:4px">
      <div class="sla">World Power v3.0 🇮🇷</div>
      <div class="sde">روز ${G.day} | ${CD[G.pid]?.name||""} | متحدین: ${G.al.length}/2</div>
      <div class="sde">سقف پول: ${fRial(MAX_MONEY)}</div>
    </div>`;
}
function togSFX(){SFX.on=!SFX.on;if(SFX.on)pCk();document.getElementById("sfxTg")?.classList.toggle("on",SFX.on);}

// ===== TABS =====
let opPl=null;
function swTab(t){
  clPl();document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t)?.classList.add("active");
  if(t==="map")return;
  const pm={shop:"shopPl",diplo:"diploPl",stats:"statsPl",req:"reqPl",settings:"settPl"};
  if(pm[t]){if(t==="shop")rSh();if(t==="diplo")rDiplo();if(t==="stats")rStats();if(t==="req")rReqs();if(t==="settings")rSett();opPl2(pm[t]);}
}
function opPl2(id){document.getElementById(id).classList.add("open");opPl=id;}
function clPl(){if(opPl){document.getElementById(opPl).classList.remove("open");opPl=null;}document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));document.getElementById("tab-map")?.classList.add("active");}

// ===== ANIMATIONS =====
function animMis(x1,y1,x2,y2,icon,cb){
  const ov=document.getElementById("htmlOv"),p1=gSP(x1,y1),p2=gSP(x2,y2),el=document.createElement("div");
  el.style.cssText="position:absolute;font-size:1rem;pointer-events:none;z-index:50;";el.textContent=icon;ov.appendChild(el);
  let s=0,st=38;const iv=setInterval(()=>{const t=s/st;el.style.left=(p1.x+(p2.x-p1.x)*t-8)+"px";el.style.top=(p1.y+(p2.y-p1.y)*t-Math.sin(t*Math.PI)*60-8)+"px";s++;if(s>st){clearInterval(iv);el.remove();if(cb)cb();}},38);
}
function animShip(x1,y1,x2,y2){
  const ov=document.getElementById("htmlOv"),p1=gSP(x1,y1),p2=gSP(x2,y2),el=document.createElement("div");
  el.style.cssText="position:absolute;font-size:1.1rem;pointer-events:none;z-index:45;";el.textContent="🚢";ov.appendChild(el);
  let s=0,st=65;const iv=setInterval(()=>{const t=s/st;el.style.left=(p1.x+(p2.x-p1.x)*t-10)+"px";el.style.top=(p1.y+(p2.y-p1.y)*t+Math.sin(t*Math.PI)*38-10)+"px";s++;if(s>st){clearInterval(iv);el.remove();}},48);
}

// ===== NOTIFICATION =====
function notify(msg){const el=document.getElementById("nf");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3200);}

// ===== GAME LOOP =====
// Slow speeds: 1x = 12s per day, 2x = 6s per day
const SPDS={1:12000,2:6000};
function startLoop(){restLoop();}
function restLoop(){if(G.loop)clearInterval(G.loop);if(G.spd===0||!G.pid)return;G.loop=setInterval(tick,SPDS[G.spd]);}
function setSp(s){G.spd=s;["sp0","sp1","sp2"].forEach((id,i)=>document.getElementById(id)?.classList.toggle("active",[0,1,2][i]===s));restLoop();}

function tick(){
  G.day++;const s=G.cs[G.pid];
  // Oil production with upgrades
  const om=G.owned["oilwell"]?(G.upg["oilwell"]?[2,3,5][Math.min(G.upg["oilwell"]-1,2)]:2):1;
  const pm=G.owned["port"]?(1+(G.upg["port"]||0)*0.25+0.25):1;
  s.oil+=2e9*om; // 2B liters per day base
  // Income
  const um=G.owned["university"]?(1+(G.upg["university"]||0)*0.2+0.2):1;
  if(G.owned["port"])s.money=Math.min(MAX_MONEY,s.money+15e9*pm);
  if(G.owned["university"])s.money=Math.min(MAX_MONEY,s.money+20e9*um);
  s.money=Math.min(MAX_MONEY,s.money+5e9+G.al.length*8e9);
  // Happy
  s.happy=Math.max(20,s.happy-0.05);
  if(G.owned["mall"])s.happy=Math.min(100,s.happy+0.04*(1+(G.upg["mall"]||0)*0.5));
  if(G.owned["hospital"])s.happy=Math.min(100,s.happy+0.04*(1+(G.upg["hospital"]||0)*0.5));
  // AI
  if(G.day%2===0)aiTick();
  if(G.day%15===0)genAIReq();
  updH();if(G.day%10===0)colMap();
}

function aiTick(){
  const ids=gIds().filter(i=>i!==G.pid);
  for(let id of ids){
    const s=G.cs[id];
    s.oil+=1.5e9+Math.random()*1e9;
    s.money=Math.min(MAX_MONEY*1.5,s.money+Math.random()*15e9);
    // Trade between AIs
    const p=ids[Math.floor(Math.random()*ids.length)];
    if(p!==id){s.money=Math.min(MAX_MONEY*1.5,s.money+Math.random()*8e9);G.cs[p].money=Math.min(MAX_MONEY*1.5,G.cs[p].money+Math.random()*5e9);}
    // AI alliances (max 2, not with player's allies)
    if(s.al.length<2&&Math.random()<0.01){
      const c=ids[Math.floor(Math.random()*ids.length)];
      if(c!==id&&!s.al.includes(c)&&!G.al.includes(c)){s.al.push(c);G.cs[c].al=G.cs[c].al||[];if(G.cs[c].al.length<2)G.cs[c].al.push(id);}
    }
    // AI attack (NOT allies, limited by weapon count)
    if((s.mis>0||s.jets>0||s.drones>0)&&Math.random()<0.008){
      const ens=ids.filter(i=>G.cs[i].rel==="enemy"&&!s.al.includes(i)&&!G.al.includes(i));
      if(ens.length>0){
        const tg=ens[Math.floor(Math.random()*ens.length)];
        if(s.mis>0)s.mis--;else if(s.jets>0)s.jets--;else if(s.drones>0)s.drones--;
        const dr=[0,0.35,0.55,0.7,0.85,0.92][Math.min(G.cs[tg].defLvl,5)];
        if(Math.random()>dr){G.cs[tg].money=Math.max(0,G.cs[tg].money-Math.random()*30e9);if(tg===G.pid){notify(`⚠️ ${CD[id].flag} ${CD[id].name} به شما حمله کرد!`);pWar();}}
      }
    }
    // AI buy weapons occasionally
    if(s.money>150e9&&Math.random()<0.01){s.money-=80e9;s.mis+=4;}
    if(s.money>300e9&&Math.random()<0.008){s.money-=150e9;s.drones+=6;}
    s.happy=Math.max(20,Math.min(100,s.happy+(Math.random()-.5)*0.4));
  }
}

function genAIReq(){
  const ids=gIds().filter(i=>i!==G.pid);
  if(Math.random()<0.5){
    const from=ids[Math.floor(Math.random()*ids.length)],b=CD[from];if(!b)return;
    const t=Math.random();let req={from};
    const qty=Math.floor(Math.random()*4+1)*100;
    if(t<0.28){const p=Math.floor(qty*28e6);req.msg=`${b.flag} ${b.name} می‌خواهد ${qty*100}M L نفت بخرد → ${fRial(p)}`;req.oil=-qty*100e6;req.money=p;}
    else if(t<0.52){const p=Math.floor(qty*25e6);req.msg=`${b.flag} ${b.name} پیشنهاد فروش ${qty*100}M L نفت → ${fRial(p)}`;req.oil=qty*100e6;req.money=-p;}
    else if(t<0.72){const g=Math.floor(Math.random()*50e9+20e9);req.msg=`${b.flag} ${b.name} پیشنهاد همکاری اقتصادی → هدیه ${fRial(g)}`;req.money=g;req.oil=0;}
    else if(t<0.88){req.msg=`${b.flag} ${b.name} درخواست اتحاد نظامی دارد`;req.isA=true;req.money=0;req.oil=0;}
    else{const mis=Math.floor(Math.random()*5+3);const p=Math.floor(mis*25e9);req.msg=`${b.flag} ${b.name} پیشنهاد فروش ${mis} موشک → ${fRial(p)}`;req.extraMis=mis;req.money=-p;}
    G.reqs.push(req);updH();
  }
}
</script>
